apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: pdf-converter
  namespace: pdf-converter
spec:
  interval: 1m
  releaseName: pdf-converter
  chart:
    spec:
      chart: gotenberg
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: gotenberg-repo
        namespace: flux-system
  values:
    fullnameOverride: pdf-converter
    image:
      repository: gotenberg/gotenberg
      tag: "8"
    api:
      timeout: "300s"
    extraEnv:
      - name: MAXIMUM_WAIT_TIMEOUT
        value: "300"
    securityContext:
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: true
      privileged: true
      runAsUser: 1001
    logging:
      level: debug
    service:
      type: ClusterIP
      port: 3000
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

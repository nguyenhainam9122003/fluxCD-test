apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: fluxcd-local
  namespace: flux-system
spec:
  interval: 5s
  url: file:///repo
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-local
  namespace: flux-system
spec:
  interval: 5s
  sourceRef:
    kind: GitRepository
    name: fluxcd-local
  path: ./apps
  prune: true
  wait: true

apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: fluxcd-test
  namespace: flux-system
spec:
  interval: 30s
  url: https://github.com/nguyenhainam9122003/fluxCD-test.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 30s
  sourceRef:
    kind: GitRepository
    name: fluxcd-test
  path: ./apps
  prune: true
  wait: true
